<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS-DOS · Calcite bench (Zork1 stabilisation)</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; font-size: 13px; background: #111; color: #eee; padding: 8px; margin: 0; }
    h1 { font-size: 15px; margin: 0 0 8px; }
    .row { display: flex; gap: 8px; align-items: flex-start; }
    #log { background: #000; color: #0f0; padding: 6px; min-height: 160px; white-space: pre-wrap; flex: 1; }
    #results { background: #000; color: #ff0; padding: 6px; min-width: 280px; white-space: pre; }
    iframe { border: 1px solid #444; background: #000; display: block; margin-top: 8px; }
    button { background: #222; color: #eee; border: 1px solid #666; padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: inherit; }
    button:disabled { opacity: 0.4; }
    #status { margin-left: 8px; }
  </style>
</head>
<body>
  <h1>CSS-DOS · Calcite bench — Zork1 to <code>&gt;</code> prompt (23M cycles)</h1>
  <div>
    <button id="run1">Run 1×</button>
    <button id="run3">Run 3×</button>
    <span id="status">idle</span>
  </div>
  <div class="row">
    <div id="log">(log)</div>
    <div id="results">(no results yet)</div>
  </div>
  <iframe id="frame" width="720" height="460"></iframe>

  <script type="module">
    import { buildCabinetInBrowser } from '/browser-builder/main.mjs';
    import { saveCabinet, purgeCabinets } from '/browser-builder/storage.mjs';

    const logEl = document.getElementById('log');
    const resultsEl = document.getElementById('results');
    const statusEl = document.getElementById('status');
    const frameEl = document.getElementById('frame');
    logEl.textContent = '';

    function log(s) {
      console.log('[bench]', s);
      logEl.textContent += s + '\n';
    }

    // Cart selection. Default is Zork1-2 (dos-corduroy, boot-stabilisation
    // test). `?cart=plasma` switches to the 44-byte Mode 13h plasma — a
    // CPU-bound workload that writes every pixel every frame, so peak
    // throughput actually matters. No stabilisation point — runs forever
    // at ~uniform cycles/sec.
    const CART_CHOICE = new URLSearchParams(location.search).get('cart') || 'zork';
    const CARTS = {
      zork: {
        base: '/bench-assets/zork1-2/',
        files: ['_ZORK1.COM', 'NNANSI.COM', 'README.TXT', 'SETUP.INF', 'ZORK1.BAT', 'DATA/ZORK1.DAT', 'DATA/ZORK1.SAV'],
        autorun: '_ZORK1.COM',
        preset: 'dos-corduroy',
      },
      plasma: {
        // Hack preset: just the .COM, no floppy. We embed the 44 bytes
        // as hex so no fetch is needed.
        hex: 'b81300cd10b800a08ed831ed31ff31d231c989d001c801e888054741' +
             '81f9400172f04281fac80072e745ebe0',
        programName: 'PLASMA.COM',
        preset: 'hack',
      },
    };
    const CART = CARTS[CART_CHOICE];

    // Fetch cart files (or decode the embedded hex for plasma).
    // Missing files (e.g. DATA/ZORK1.SAV) are skipped rather than fatal.
    async function fetchCart() {
      if (CART.hex) {
        // Inline cart — just decode.
        const hex = CART.hex;
        const bytes = new Uint8Array(hex.length / 2);
        for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i*2, 2), 16);
        return { programBytes: bytes, programName: CART.programName };
      }
      const out = [];
      for (const rel of CART.files) {
        const url = CART.base + rel;
        try {
          const r = await fetch(url);
          if (!r.ok) { log(`  skip ${rel} (HTTP ${r.status})`); continue; }
          const bytes = new Uint8Array(await r.arrayBuffer());
          const name = rel.toUpperCase().replaceAll('/', '\\');
          out.push({ name, bytes });
        } catch (e) {
          log(`  skip ${rel} (${e.message})`);
        }
      }
      return { files: out };
    }

    // Wait for the SW to be the controller. On hard refresh it can take
    // a moment to claim the page.
    async function waitForSW() {
      if (!('serviceWorker' in navigator)) throw new Error('no SW support');
      const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
      await navigator.serviceWorker.ready;
      if (!navigator.serviceWorker.controller) {
        await new Promise((res) => {
          navigator.serviceWorker.addEventListener('controllerchange', res, { once: true });
          // Kick it — the registration may already be active but not controlling.
          setTimeout(() => {
            if (navigator.serviceWorker.controller) res();
          }, 100);
        });
      }
      return reg;
    }

    // Spawn the calcite-bridge worker and register its SW port — this is
    // exactly what assets/calcite-bridge-boot.js does. We duplicate it
    // here (rather than load it) so we can run it deterministically from
    // code, with no timing race against build.html's boot.
    let bridgeWorker = null;
    async function spawnBridgeOnce() {
      if (bridgeWorker) return bridgeWorker;
      const reg = await waitForSW();
      const bridge = new Worker('/player/calcite-bridge.js', { type: 'module' });
      bridge.addEventListener('message', (ev) => {
        const d = ev.data;
        if (d && d.type === 'status') log('[bridge] ' + d.message);
      });
      const ch = new MessageChannel();
      bridge.postMessage({ type: 'sw-port' }, [ch.port1]);
      const sw = navigator.serviceWorker.controller || reg.active;
      if (sw) {
        sw.postMessage({ type: 'register-calcite-bridge' }, [ch.port2]);
      }
      bridgeWorker = bridge;
      return bridge;
    }

    // Run one bench: build, swap cabinet in cache, point iframe at
    // calcite.html?bench=1, await result.
    async function runOnce(runIndex) {
      statusEl.textContent = `run ${runIndex}: building...`;
      log(`\n=== run ${runIndex} ===`);

      const t0 = performance.now();
      log(`cart: ${CART_CHOICE}`);
      const cart = await fetchCart();
      if (cart.files) log(`  got ${cart.files.length} files`);

      log('building cabinet...');
      const buildOpts = { preset: CART.preset };
      if (cart.programBytes) {
        buildOpts.programBytes = cart.programBytes;
        buildOpts.programName = cart.programName;
      } else {
        buildOpts.files = cart.files;
        buildOpts.autorun = CART.autorun;
      }
      const blob = await buildCabinetInBrowser(buildOpts);
      log(`  cabinet: ${(blob.size/1024/1024).toFixed(1)} MB`);
      await saveCabinet(blob);
      log(`  saved to Cache Storage in ${(performance.now()-t0).toFixed(0)}ms`);

      // Spawn the bridge (once per page), then hand it the cabinet bytes
      // directly. The old path relied on a BroadcastChannel from
      // saveCabinet() + a SW-fetch inside the bridge; we now post the
      // Blob so the bridge can arrayBuffer() it off the main thread.
      const bridge = await spawnBridgeOnce();
      bridge.postMessage({ type: 'cabinet-blob', blob });

      // Point the iframe at the runner with bench mode on. The iframe's
      // <img> fetch triggers 'viewer-connected' → the bridge resets + ticks.
      statusEl.textContent = `run ${runIndex}: running...`;
      frameEl.src = '';
      // Tiny delay so the iframe reload is unambiguous.
      await new Promise(r => setTimeout(r, 50));
      frameEl.src = '/player/calcite.html?bench=1&_t=' + Date.now();

      // Await the bench-result postMessage from the iframe.
      const result = await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('bench timeout (180s)')), 180000);
        window.addEventListener('message', function handler(ev) {
          if (ev.data && ev.data.type === 'bench-result') {
            clearTimeout(timeout);
            window.removeEventListener('message', handler);
            resolve(ev.data.result);
          }
        });
      });

      log(`run ${runIndex} DONE: ${result.totalMs.toFixed(0)}ms, ` +
          `boot ${result.pctOf8086.toFixed(1)}%, idle ${result.idlePctOf8086.toFixed(1)}% of 8086, ` +
          `${result.idleEncodedPerSec.toFixed(0)} fps`);
      return result;
    }

    function summarise(runs) {
      const pick = (k) => runs.map(r => r[k]);
      const stats = (arr) => {
        const sorted = arr.slice().sort((a,b)=>a-b);
        const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
        return { min: sorted[0], max: sorted[sorted.length-1], mean, median: sorted[(sorted.length/2)|0] };
      };
      return {
        n: runs.length,
        toTargetMs:        stats(pick('toTargetMs')),
        cyclesPerSec:      stats(pick('steadyCyclesPerSec')),
        pctOf8086:         stats(pick('pctOf8086')),
        idleCyclesPerSec:  stats(pick('idleCyclesPerSec')),
        idlePctOf8086:     stats(pick('idlePctOf8086')),
        idleEncodedPerSec: stats(pick('idleEncodedPerSec')),
        steadyBatch:       stats(pick('steadyBatch')),
      };
    }

    async function runN(n) {
      document.getElementById('run1').disabled = true;
      document.getElementById('run3').disabled = true;
      resultsEl.textContent = '(running...)';
      const runs = [];
      try {
        for (let i = 1; i <= n; i++) {
          // Purge cabinet between runs so each build is clean and the
          // bridge's compile cache-path is exercised identically.
          await purgeCabinets();
          const r = await runOnce(i);
          runs.push(r);
        }
        const summary = summarise(runs);
        resultsEl.textContent = JSON.stringify({ summary, runs: runs.map(r => ({
          toTargetMs: +r.toTargetMs.toFixed(0),
          bootPct: +r.pctOf8086.toFixed(1),
          idlePct: +r.idlePctOf8086.toFixed(1),
          idleEncFps: +r.idleEncodedPerSec.toFixed(1),
          batch: r.steadyBatch,
          bridgeFrames: r.bridgeFramesEncoded,
        })) }, null, 2);
        window.__benchSummary = { summary, runs };
        statusEl.textContent = `done (${n} runs)`;
      } catch (e) {
        resultsEl.textContent = 'ERROR: ' + e.message;
        statusEl.textContent = 'error';
        log('ERROR: ' + (e.stack || e.message));
      } finally {
        document.getElementById('run1').disabled = false;
        document.getElementById('run3').disabled = false;
      }
    }

    document.getElementById('run1').onclick = () => runN(1);
    document.getElementById('run3').onclick = () => runN(3);

    // Auto-run via ?n=3 (used by Playwright).
    const auto = new URLSearchParams(location.search).get('n');
    if (auto) runN(parseInt(auto, 10) || 1);
  </script>
</body>
</html>
